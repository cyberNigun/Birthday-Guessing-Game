<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Desola 🕯️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Pinyon+Script&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-pink: #fce4ec;
            --chocolate: #3e2723;
            --parchment: #f1dca7;
        }

        body {
            background-color: var(--bg-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--chocolate);
        }

        /* Initial Envelope Screen */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 1s ease;
        }

        .envelope {
            width: 180px;
            height: 120px;
            background: #d4b475;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }

        .envelope:hover { transform: scale(1.05); }

        .wax-seal {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #8e0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Parchment Styling */
        .parchment-container {
            perspective: 1000px;
            width: 100%;
            max-width: 600px;
            display: none;
        }

        .parchment {
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 40px;
            min-height: 400px;
            box-shadow: 10px 10px 40px rgba(0,0,0,0.2);
            position: relative;
            transform-origin: top;
            transform: rotateX(-90deg);
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(1% 1%, 98% 0%, 100% 15%, 98% 85%, 100% 100%, 85% 98%, 15% 100%, 0% 85%, 2% 15%);
        }

        .parchment.unfolded { transform: rotateX(0deg); }

        .message-content {
            font-family: 'EB Garamond', serif;
            font-size: 1.2rem;
            line-height: 1.6;
            text-align: left;
            white-space: pre-line;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .sender-reveal {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.5rem;
            margin-top: 20px;
            text-align: right;
            opacity: 0;
            transition: opacity 1s;
        }

        /* Buttons */
        .choice-grid {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }

        .choice-btn {
            background: var(--chocolate);
            color: var(--parchment);
            border: none;
            padding: 12px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .choice-btn:hover { background: #5d4037; transform: translateY(-2px); }

        .next-btn {
            margin-top: 20px;
            background: #8e0000;
            color: white;
            padding: 10px 30px;
            border-radius: 20px;
            display: none;
            cursor: pointer;
            border: none;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
        }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--chocolate); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 style="font-family: 'Dancing Script';">A Private Letter for Ikmat</h1>
        <div class="envelope" onclick="openLetter()">
            <div class="wax-seal">M</div>
        </div>
        <p style="font-family: 'EB Garamond'; font-style: italic; margin-top: 20px;">Tap to break the seal</p>
    </div>

    <div id="main-game" class="hidden">
        <h2 id="round-title" style="font-family: 'Dancing Script';">Message 1 of 6</h2>
        
        <div class="parchment-container" id="container">
            <div class="parchment" id="paper">
                <div id="text-area" class="message-content"></div>
                <div id="reveal-area" class="sender-reveal"></div>
            </div>
        </div>

        <p id="instruction" style="font-family: 'Dancing Script'; font-size: 1.3rem; margin-top: 20px;">Who sent this heart-felt note?</p>
        
        <div class="choice-grid" id="choices"></div>
        <button id="next-round" class="next-btn" onclick="nextRound()">Read Next Letter →</button>
    </div>

    <script>
        const wishes = [
            { author: "Blessings", text: `My forever friend, Desola mi owon, my sweet angel on earth...\n\nLove is the silent comfort I feel every time I text you, love is how full your heart is when it comes to me. This year makes it ten years since I met you. I'm proud of you, Ikmat. I'm proud of your hard work, the way you guard your heart jealously.\n\nI can't wait for that Santorini trip to happen. I love you so much baby.` },
            { author: "Posi", text: `My IKM! My Minerva for a reason 🤭\n\nI remember when you spoke at the Afara Workshop Training… I paused for a minute and whispered to myself, “Yes. That’s my girl, y’all.” 🥹😍\n\nWelcome to your year of Becoming Her 🤭🥰. May this new year bring you joy that feels like sunlight.` },
            { author: "Oke", text: `Happy Birthday to my forever twin 🤍✨\n\nSix whole years of friendship. We’ve literally grown up together... people call us twins (which I secretly love). You are a warrior. At least i know one in marine science, she's gracefully beautiful. Watching you heal has been inspiring.\n\nI love you endlessly, ERINFOLAMI MI🥰🥂.` },
            { author: "Angel", text: `Ikimo! Happy birthday my love\n\nFinding your friendship feels like winning the friend lottery! From being the best swim partner to the best siwes partner everrr!\n\nLet's get the funds for that bbl quickly so we can start working towards a girl's trip to Mauritius! Love you loads!❤️` },
            { author: "Solomon", text: `Happy Birthday, Minerva! ❤️\n\nMinerva 💗 is such a beautiful, unique, and amazing queen. Her smile is truly everything! She is a public speaking enthusiast who radiates confidence.\n\nContinue to excel and be the best version of yourself!` },
            { author: "Lola", text: `Today, I celebrate not just my roommate, but my sister, my fashionista, my photographer and videographer.\n\nLiving with you has been such a gift. In a world that can be loud and overwhelming, you are peace. You are softness. You are home. Happy Birthday, my person. I love you deeply 💛✨` }
        ];

        let currentIdx = 0;
        const allNames = wishes.map(w => w.author);

        function openLetter() {
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').classList.add('hidden');
                document.getElementById('main-game').classList.remove('hidden');
                document.getElementById('container').style.display = 'block';
                setTimeout(() => document.getElementById('paper').classList.add('unfolded'), 100);
                loadRound();
            }, 1000);
        }

        function loadRound() {
            const data = wishes[currentIdx];
            document.getElementById('round-title').innerText = `Message ${currentIdx + 1} of 6`;
            document.getElementById('text-area').innerText = data.text;
            document.getElementById('reveal-area').style.opacity = '0';
            document.getElementById('reveal-area').innerText = `~ ${data.author}`;
            document.getElementById('instruction').classList.remove('hidden');
            document.getElementById('next-round').style.display = 'none';
            
            const grid = document.getElementById('choices');
            grid.innerHTML = '';
            
            // Shuffle names
            const shuffled = [...allNames].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = name;
                btn.onclick = () => check(name, btn);
                grid.appendChild(btn);
            });
        }

        function check(name, btn) {
            if (name === wishes[currentIdx].author) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#3e2723', '#f8bbd0'] });
                document.getElementById('reveal-area').style.opacity = '1';
                document.getElementById('choices').innerHTML = '';
                document.getElementById('instruction').classList.add('hidden');
                document.getElementById('next-round').style.display = 'inline-block';
            } else {
                btn.style.background = '#b71c1c';
                btn.innerText = "Try again!";
            }
        }

        function nextRound() {
            currentIdx++;
            if (currentIdx < wishes.length) {
                loadRound();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('round-title').innerText = "Happy Birthday, Ikmat!";
            document.getElementById('text-area').innerHTML = "<h2 style='text-align:center'>You are truly loved by many. <br><br> May this year be your best one yet!</h2>";
            document.getElementById('reveal-area').innerText = "";
            document.getElementById('next-round').style.display = 'none';
            
            var end = Date.now() + (7 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
