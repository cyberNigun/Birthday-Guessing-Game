<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Desola 🕯️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Pinyon+Script&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-pink: #fce4ec;
            --chocolate: #3e2723;
            --parchment: #f1dca7;
        }

        body {
            background-color: var(--bg-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--chocolate);
        }

        #intro-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 1s ease;
        }

        .envelope {
            width: 180px;
            height: 120px;
            background: #d4b475;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wax-seal {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #8e0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .parchment-container {
            perspective: 1000px;
            width: 100%;
            max-width: 600px;
            display: none;
        }

        .parchment {
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            padding: 40px;
            min-height: 400px;
            box-shadow: 10px 10px 40px rgba(0,0,0,0.2);
            position: relative;
            transform-origin: top;
            transform: rotateX(-90deg);
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(1% 1%, 98% 0%, 100% 15%, 98% 85%, 100% 100%, 85% 98%, 15% 100%, 0% 85%, 2% 15%);
        }

        .parchment.unfolded { transform: rotateX(0deg); }

        .message-content {
            font-family: 'EB Garamond', serif;
            font-size: 1.15rem;
            line-height: 1.5;
            text-align: left;
            white-space: pre-line;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 15px;
        }

        .sender-reveal {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.8rem;
            margin-top: 25px;
            text-align: right;
            visibility: hidden; /* Changed from opacity to prevent flicker */
        }

        .choice-grid {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .choice-btn {
            background: var(--chocolate);
            color: var(--parchment);
            border: none;
            padding: 12px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .next-btn {
            margin-top: 20px;
            background: #8e0000;
            color: white;
            padding: 12px 35px;
            border-radius: 25px;
            display: none;
            cursor: pointer;
            border: none;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
        }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #8d6e63; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 style="font-family: 'Dancing Script';">A Private Letter for Ikmat</h1>
        <div class="envelope" onclick="openLetter()">
            <div class="wax-seal">M</div>
        </div>
    </div>

    <div id="main-game" class="hidden">
        <h2 id="round-title" style="font-family: 'Dancing Script';">Message 1 of 6</h2>
        
        <div class="parchment-container" id="container">
            <div class="parchment" id="paper">
                <div id="text-area" class="message-content"></div>
                <div id="reveal-area" class="sender-reveal"></div>
            </div>
        </div>

        <div id="ui-controls">
            <p id="instruction" style="font-family: 'Dancing Script'; font-size: 1.4rem; margin-top: 15px;">Who wrote this note?</p>
            <div class="choice-grid" id="choices"></div>
        </div>
        
        <button id="next-round" class="next-btn" onclick="nextRound()">Read Next Letter →</button>
    </div>

    <script>
        const wishes = [
            { author: "blessings", text: `My forever friend, Desola mi owon, my sweet angel on earth,\n\nYou know I used to think love meant buying the world for a person, going to the greatest length for them but in this past chaotic and testing year, I learnt something new, especially with you, love is beyond all that. Love is the silent comfort I feel every time I text you, love is how full your heart is when it comes to me, love is how we can never seem to get enough of each other, love is living and growing for each other. My sweet best friend, you mean the world to me. You're strong, kind, beautiful, inspiring and every time I think about you, I pray that God restores your light to the fullest again. \n\nIt is your birthday today. You're finally becoming a big girl, my big girl. Can you believe it? 😂 My best friend is on her way to adulthood, ugh, I can't believe how much time has passed. This year makes it ten years since I met you. Ten years of getting assigned to the same class and boyyyy, I'm so grateful that our paths crossed. \n\nYou're the literal bane of my existence. You make life worth living in every way and if I had to choose, I would choose you over and over again. Perhaps in our next life, we'll get to be sisters and our love will be fuller. \n\nIn this new year, I want to remind you that you've been doing a good job with your life so far. You've managed to live through the most painful moment of anyone's life and still glow everyday like the queen that you are. I'm proud of you, Ikmat. I mean it. I'm proud of your hard work, the way you guard your heart jealously….ugh, it fills me with so much pride. I'm proud of your consistency, your discipline, your effort and your sincerity. \n\nYou're really my perfect angel. My sister. \n\nIn this new year, I pray that the Lord blesses your sweet heart and rewards you with the good and perfect things you desire. I pray that your healing moves faster and less painful. I pray that within the next couple of years, life would work so perfectly for you that you'll look back on these moments and smile. \n\nTo my best friend, Desola mi owon, I love you so much, so much more than you can ever imagine. \n\nI can't wait for that Santorini trip to happen, ugh, I can't waitttttt. \n\nI love you so much baby. \nHappy birthday. \n\nYours forever, ` },
            { author: "Posi", text: `My IKM!\nMy Minerva for a reason 🤭\nBig and Mighty, always and forever.\nI remember when you spoke at the Afara Workshop Training…\nI paused for a minute and whispered to myself,\n“Yes. That’s my girl, y’all.” 🥹😍\nIt’s your poise and your energy for me.\nThe way you carry yourself with so much grace, depth, and quiet power.\nYou don’t just enter a room, you arrive.\nIt’s the little things you do…\nBut somehow, when you do them,\nThey become so real, so intentional, so BIG 😍😍\nWelcome to a new year \nA year overflowing with blessings, growth, and undeniable goodness.\nWelcome to your year of Becoming Her 🤭🥰\nThe woman you’ve always carried inside you.\nMay this new year bring you joy that feels like sunlight,\nHappiness that stays,\nAnd countless reasons to smile wide and soft 🫂💕\nHappy Birthday, Ikmat ❤️🎉\nLove youuuuuuuuuuu always 💞🫂` },
            { author: "Oke", text: `Happy Birthday to my forever twin 🤍✨\n\nSix whole years of friendship, memories, laughter, growth, and even tears — and I wouldn’t trade a single moment of it. We’ve literally grown up together in the same higher institution, and somehow even started looking alike to the point people call us twins (which I secretly love, by the way).\n\nYou are a warrior. Not all soldiers wear armor or go to battle field, at least i know one in marine science, she's gracefully beautiful . Watching you heal, grow stronger, and become even more beautiful inside and out has been inspiring. You’ve shown so much strength and grace, and I’m so proud of the woman you’re becoming.\n\nYou coming to celebrate my birthday meant more to me than words can say. That’s who you are — thoughtful, loyal, intentional. An absolute darling in every sense of the word.\n\nThank you for being my safe place, my gist partner, my study buddy, my voice of reason, and my twin. May this new year bring you the kind of love that stays, the success you work so hard for, peace that fills your heart, and happiness that overflows.\n\nHere’s to many more years of looking alike, laughing too loud, dreaming big, and winning together.\n\nI love you endlessly, my twin 🤍🎉. \nHappy Birthday, ERINFOLAMI MI🥰🥂.` },
            { author: "Angel", text: `Ikimo! Happy birthday my love\nI don't know if it was destiny or just prefect timing, but finding your friendship feels like winning the friend lottery!\n You're not just kind, but hardworking, amazing and such a source of motivation. From being the best swim partner to the best siwes partner to just being the best person everrr! The best dancer everr though I don't think I've seen those dance steps. \nSo grateful to God for blessing me with you!\nLet's get the funds for that bbl quickly so we can start working towards a girl's trip to Mauritius!\nHappy birthday again Minerva! 🤍\nLove you loads!❤️.` },
            { author: "Solomon", text: `Happy Birthday, Minerva! ❤️\n\nMinerva 💗 is such a beautiful, unique, and amazing queen. Her smile is truly everything! She is a public speaking enthusiast who is outspoken and radiates confidence.\n\nMinerva brings joy, excitement, and happiness wherever she goes, and she is genuinely an optimistic person.\n\nContinue to excel, stand out, and be the best version of yourself, Minerva. Once again, happy birthday!` },
            { author: "Lola", text: `Happy Birthday, Minerva 🤍.\nToday, I celebrate not just my roommate, but my sister, my fashionista, my photographer and videographer, my calm in chaos, and one of the most beautiful souls I know.\nLiving with you has been such a gift. Your calm spirit, your quiet strength, and the way you carry yourself with so much grace inspire me more than you know. In a world that can be loud and overwhelming, you are peace. You are softness. You are home.\nThank you for the late-night talks, the silent understanding, the comfort, and the steady presence you bring into my life. You’ve turned ordinary days into special memories just by being you.\nI pray this new year brings you everything your gentle heart deserves  deep joy, genuine love, answered prayers, and blessings that overflow. May life be kind to you the way you are kind to others. May you never lose your calm light, and may it continue to shine brighter each year.\nI’m so grateful that I get to do life this close to you. Happy Birthday, my person. I love you deeply 💛✨` }
        ];

        let currentIdx = 0;
        const allNames = wishes.map(w => w.author);

        function openLetter() {
            document.getElementById('intro-overlay').classList.add('hidden');
            document.getElementById('main-game').classList.remove('hidden');
            document.getElementById('container').style.display = 'block';
            setTimeout(() => document.getElementById('paper').classList.add('unfolded'), 50);
            loadRound();
        }

        function loadRound() {
            const data = wishes[currentIdx];
            document.getElementById('round-title').innerText = `Message ${currentIdx + 1} of 6`;
            
            // Text area reset
            const textArea = document.getElementById('text-area');
            textArea.innerText = data.text;
            textArea.scrollTop = 0;

            // Name Reveal Area reset (Hard Hide)
            const revealArea = document.getElementById('reveal-area');
            revealArea.style.visibility = 'hidden'; 
            revealArea.innerText = `~ ${data.author}`;

            document.getElementById('ui-controls').classList.remove('hidden');
            document.getElementById('next-round').style.display = 'none';
            
            const grid = document.getElementById('choices');
            grid.innerHTML = '';
            
            const shuffled = [...allNames].sort(() => Math.random() - 0.5);
            shuffled.forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = name;
                btn.onclick = () => {
                    if (name === wishes[currentIdx].author) {
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
                        revealArea.style.visibility = 'visible';
                        document.getElementById('ui-controls').classList.add('hidden');
                        document.getElementById('next-round').style.display = 'inline-block';
                    } else {
                        btn.style.opacity = '0.3';
                        btn.disabled = true;
                    }
                };
                grid.appendChild(btn);
            });
        }

        function nextRound() {
            currentIdx++;
            if (currentIdx < wishes.length) {
                loadRound();
            } else {
                document.getElementById('main-game').innerHTML = "<h1 style='font-family:Dancing Script; font-size: 3.5rem;'>Happy Birthday, Ikmat! ❤️</h1><p>You are so loved.</p>";
                confetti({ particleCount: 300, spread: 100 });
            }
        }
    </script>
</body>
</html>
